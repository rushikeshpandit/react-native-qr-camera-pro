// build.gradle — QrCameraPro Android library build script.
//
// Version overrides: the host app can pin any of the version keys listed in
// `ext.QrCameraPro` by setting the same key on `rootProject.ext` before this
// script is evaluated. `getExtOrDefault` reads the host's value when present,
// falling back to the library default otherwise.

buildscript {
  ext.QrCameraPro = [
    kotlinVersion    : "2.0.21",
    minSdkVersion    : 24,
    compileSdkVersion: 36,
    targetSdkVersion : 36,
  ]

  // Reads a build property from the host project, falling back to the library
  // default declared in ext.QrCameraPro above.
  ext.getExtOrDefault = { prop ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : QrCameraPro[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

android {
  namespace "com.qrcamerapro"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion    getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    // Enables BuildConfig generation (e.g. BuildConfig.DEBUG).
    buildConfig true
  }

  buildTypes {
    release {
      // Minification is disabled because this is a library — the host app's
      // ProGuard/R8 configuration controls shrinking of the merged output.
      minifyEnabled false
    }
  }

  lint {
    // Suppresses the GradleCompatible warning that fires when the Gradle plugin
    // version is newer than the lint rules bundled with the Android Gradle Plugin.
    disable "GradleCompatible"
  }

  compileOptions {
    // CameraX and ML Kit require Java 8 source/target compatibility.
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  // React Native Android runtime — version is controlled by the host app.
  implementation "com.facebook.react:react-android"

  // ------------------------------------------------------------------
  // CameraX
  // Pinned to a stable release. camera-video is intentionally omitted —
  // this library only uses Preview + ImageAnalysis; video recording is
  // not part of the public API and pulling the artifact increases APK
  // size with no benefit.
  // ------------------------------------------------------------------
  def camerax_version = "1.3.4"
  implementation "androidx.camera:camera-core:${camerax_version}"
  implementation "androidx.camera:camera-camera2:${camerax_version}"
  implementation "androidx.camera:camera-lifecycle:${camerax_version}"
  implementation "androidx.camera:camera-view:${camerax_version}"
  implementation "androidx.camera:camera-extensions:${camerax_version}"

  // ML Kit barcode scanning — supplies BarcodeScanning.getClient() used in BarcodeAnalyzer.
  implementation "com.google.mlkit:barcode-scanning:17.3.0"
}